services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: feedrh
      POSTGRES_USER: feedrh
      POSTGRES_PASSWORD: feedrh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedrh -d feedrh"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3008:3008"
    volumes:
      - ./backend:/app
    environment:
      DB_URL: postgresql+psycopg2://feedrh:feedrh@db:5432/feedrh
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
