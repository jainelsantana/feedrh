services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: feedrh
      POSTGRES_USER: feedrh
      POSTGRES_PASSWORD: feedrh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedrh -d feedrh"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - feedrh_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "3007:3007"
    volumes:
      - ./backend:/app
    environment:
      DB_URL: postgresql+psycopg2://feedrh:feedrh@db:5432/feedrh
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3007/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - feedrh_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: ${API_URL:-/api}
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - feedrh_network

volumes:
  postgres_data:

networks:
  feedrh_network:
    driver: bridge
